trigger:
  branches:
    include:
      - main  # Trigger pipeline on changes to the main branch

stages:
  - stage: Build
    displayName: Build Stage
    jobs:
      - job: BuildJob
        displayName: Build Job
        pool:
          vmImage: 'windows-2019'
        steps:
          - checkout: self  # Checkout the repository

          # Use .NET Core SDK version 8.x
          - task: UseDotNet@2
            displayName: 'Use .NET Core SDK'
            inputs:
              version: '8.x'

          # Restore dependencies and build the application
          - script: |
              dotnet restore
              dotnet build --configuration Release
            displayName: 'Restore and Build'

          # Run tests
          - script: dotnet test --configuration Release --no-build
            displayName: 'Run Tests'

  - stage: Dockerize
    displayName: Dockerize Stage
    jobs:
      - job: DockerizeJob
        displayName: Dockerize Job
        pool:
          vmImage: 'windows-2019'
        steps:
          - checkout: self  # Checkout the repository

          # Log in to Azure Container Registry (ACR)
          - task: Docker@2
            displayName: 'Login to ACR'
            inputs:
              command: 'login'
              containerRegistry: 'ofqregisterapiacr'  # Replace with your ACR name
              containerRegistryType: 'Azure Container Registry'
              azureSubscription: '121c67c7-1adc-4229-8daf-4980f8e35ae3'  # Replace with your Azure subscription

          # Build and push Docker image to ACR
          - task: Docker@2
            displayName: 'Build and Push Docker Image'
            inputs:
              command: 'buildAndPush'
              repository: 'ofqregisterapiacr.azurecr.io/your-image-name'  # Replace with your ACR and image name
              dockerfile: '$(Build.SourcesDirectory)/Dockerfile'  # Path to Dockerfile
              containerRegistry: 'ofqregisterapiacr'  # Replace with your ACR name
              tags: |
                $(Build.BuildId)
                latest
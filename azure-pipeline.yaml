  - stage: Dockerize
    displayName: Dockerize Stage
    jobs:
      - job: DockerizeJob
        displayName: Dockerize Job
        # pool:
        #   vmImage: 'windows-2019'
        steps:
          - checkout: self  # Checkout the repository
          # Log in to Azure Container Registry (ACR)
          - task: Docker@2
            displayName: 'Login to ACR'
            inputs:
              command: 'login'
              containerRegistry: 'cgi-acr-connection'  # ACR name
              containerRegistryType: 'Microsoft.Container.Registry/Registries'
              azureSubscription: 'ofqual-service-connection-bola'  # Azure subscription
          # Build and push Docker image to ACR
          - task: Docker@2
            displayName: 'Build and Push Docker Image'
            inputs:
              command: 'buildAndPush'
              repository: 'bolaacr.azurecr.io/frontend-image'  # ACR and image name
              dockerfile: '$(Build.SourcesDirectory)/Dockerfile'  # Path to Dockerfile
              containerRegistry: 'cgi-acr-connection'  # ACR name
              tags: |
                $(Build.BuildId)
                latest

trigger:
- dev  # Trigger pipeline on changes to the main branch
pool: ofqual-agent

stages:
  - stage: Build
    displayName: Build Stage
    jobs:
      - job: BuildJob
        displayName: Build Job
        steps:
          - checkout: self  # Checkout the repository
          # Set environment variable for .NET Core SDK task
